# PenguinCAM Team Configuration (Version 3) — Ground-Truth Feeds/Speeds Model
# This file defines machine-specific settings and machining preferences.
#
# VERSION 3 (GROUND-TRUTH) FEATURES:
# - Materials specify *targets* (preferred RPM + chipload), not derived feeds.
# - Feeds (XY), ramp feeds, and peck feeds are computed from:
#     RPM, tool diameter, flute count, chipload scaling, machine limits, and engagement.
# - Stepdown limits are expressed as ratios of tool diameter (ap/D), not absolute inches.
#
# Units:
# - Most geometry remains inches (as before).
# - Chipload values below are in INCHES PER TOOTH (in/tooth).
#   (Internally you can convert to mm/tooth if desired; the math is identical.)

# =============================================================================
# CONFIG VERSION AND DEFAULT MACHINE
# =============================================================================
version: 3
default_machine: omio_x8

# =============================================================================
# TEAM INFORMATION (applies to all machines)
# =============================================================================
team:
  number: 6238
  name: "Popcorn Penguins"

# =============================================================================
# MACHINES
# =============================================================================
machines:
  # -------------------------------------------------------------------------
  # MACHINE 1: Omio X8-2200 (most common FRC machine)
  # -------------------------------------------------------------------------
  omio_x8:
    name: "Omio X8-2200"

    # Machine specifications
    machine:
      manufacturer: "Omio"
      controller: "Mach3"

      # Machine work envelope (inches)
      dimensions:
        x_max: 22.2
        y_max: 30.3
        z_max: 3.3

      # Park position (machine coordinates for safe part access)
      park_position:
        x: 0.5
        y: 0.5
        z: -0.5     # negative = below home, as before

      # Coordinate systems
      standard_work_offset: "G54"
      tube_jig_work_offset: "G55"

      coolant: "Air" # Air, Flood, Mist, None

      # Spindle capability limits (used for clamping computed RPM)
      spindle_limits:
        rpm_min: 6000
        rpm_max: 24000

      # Motion capability limits (used for clamping computed feeds)
      motion_limits:
        feed_xy_max: 157.0     # IPM (Omio-ish typical ceiling)
        feed_z_max: 60.0       # IPM (conservative Z ceiling)
        traverse_xy: 200.0     # IPM (rapids above material)
        approach_z: 50.0       # IPM (safe Z approach above stock)

      # Optional: coarse realism knobs (used as multipliers and/or warnings)
      machine_characteristics:
        rigidity_class: "medium"      # light | medium | heavy
        runout_class: "typical"       # excellent | good | typical | poor

        rigidity_chipload_multipliers:
          light: 0.70
          medium: 1.00
          heavy: 1.15

        # For warnings like: achieved_chipload < k * runout_estimate
        runout_estimate_in:
          excellent: 0.0004
          good:      0.0008
          typical:   0.0020
          poor:      0.0040

    # Default tooling for this machine
    default_tool:
      diameter: 0.157                   # 4mm end mill (inches)
      flutes: 1                         # new: make flute count explicit
      # Reference tool used by material chipload_ref below
      is_reference_tool: true

    # General machining preferences
    machining:
      z_reference:
        sacrifice_board_depth: 0.008
        clearance_height: 0.5

      tabs:
        enabled: true
        width: 0.25
        height: 0.15
        remove_tabs: true

      holes:
        detection_tolerance: 0.0001
        min_millable_multiplier: 1.2

      fixturing:
        pause_before_perimeter: false

      # Global feed/speed calculation policy (applies across materials unless overridden)
      feed_speed_policy:
        # Chipload scaling vs tool diameter:
        # chipload(D) = chipload_ref * (D / D_ref)^exponent
        chipload_diameter_exponent: 0.70

        # If computed XY feed is clamped by machine feed_xy_max, optionally reduce RPM
        # to recover chipload above chipload_min (helps plastics avoid rubbing/melting).
        allow_reduce_rpm_to_recover_chipload: true

        # Runout warning threshold multiplier
        runout_k_multiplier: 3.0

        # Ramp Z-component limiter (useful for steep ramps)
        limit_ramp_by_z_component:
          enabled: true
          z_cut_max: 35.0  # IPM max Z component during ramp cutting

    # Tube facing parameters (unchanged)
    tube_facing:
      depth_margin: 0.005
      max_roughing_depth: 0.3
      max_finishing_depth: 0.51

      phase_1:
        roughing_tool_edge: 0.05
        finishing_tool_edge: 0.0625

      phase_2:
        roughing_tool_edge: -0.0125
        finishing_tool_edge: 0.0

      arc_advance: 0.04
      arc_radius: 0.05

    # -------------------------------------------------------------------------
    # MATERIALS (GROUND TRUTH) — Omio X8
    # -------------------------------------------------------------------------
    materials:
      plywood:
        name: "Plywood"
        description: "Ground-truth plywood targets (derived feeds computed by PenguinCAM)"

        cutting_model:
          preferred_rpm: 18000

          # Chipload reference is for the machine's REFERENCE TOOL (default 4mm, 1F).
          chipload_ref: 0.0039           # in/tooth @ 4mm 1F (≈70 IPM @ 18k)
          chipload_min: 0.0020           # avoid rubbing
          chipload_max: 0.0080           # conservative student ceiling

          # When operation is effectively slotting (ae≈100%), derate chipload.
          slotting_chipload_multiplier: 0.80

        strategy:
          # Radial engagement defaults
          stepover_ratio: 0.65           # ae / D

          # Axial stepdown limits as ratios of tool diameter (ap / D)
          slot_stepdown_ratio: 1.00      # profiling/slotting
          clear_stepdown_ratio: 1.50     # if you ever do non-slot clearing

          ramp:
            type: "linear_or_helix"
            angle_deg: 20.0
            start_clearance: 0.150       # inches above material
            feed_multiplier: 0.65        # ramp feed = XY feed * this
            helix_radius_multiplier: 0.75

          peck_drill:
            # Peck depth derived from tool diameter
            depth_ratio: 0.25            # peck = 0.25*D
            depth_min: 0.030             # inches
            depth_max: 0.080             # inches
            feed_multiplier: 0.15        # peck feed = XY feed * this (then clamp by feed_z_max)

      aluminum:
        name: "Aluminum"
        description: "Ground-truth router aluminum targets (Omio-class assumptions)"

        cutting_model:
          preferred_rpm: 18000

          chipload_ref: 0.0028           # in/tooth @ 4mm 1F (≈50 IPM @ 18k)
          chipload_min: 0.0015
          chipload_max: 0.0035

          slotting_chipload_multiplier: 0.70

        strategy:
          stepover_ratio: 0.25

          # Aluminum slotting needs shallow ap/D on routers
          slot_stepdown_ratio: 0.25      # ap ≈ 1.0mm per pass for 4mm tool
          clear_stepdown_ratio: 0.50     # only if radial engagement is small and chips clear

          ramp:
            type: "linear_or_helix"
            angle_deg: 4.0
            start_clearance: 0.050
            feed_multiplier: 0.60
            helix_radius_multiplier: 0.50

          peck_drill:
            depth_ratio: 0.20
            depth_min: 0.020
            depth_max: 0.060
            feed_multiplier: 0.10

      polycarbonate:
        name: "Polycarbonate"
        description: "Ground-truth polycarbonate targets (avoid rubbing/heat)"

        cutting_model:
          preferred_rpm: 18000

          chipload_ref: 0.0039           # keep chips moving; avoid rub
          chipload_min: 0.0025
          chipload_max: 0.0070

          slotting_chipload_multiplier: 0.85

        strategy:
          stepover_ratio: 0.55

          slot_stepdown_ratio: 0.75
          clear_stepdown_ratio: 1.25

          ramp:
            type: "linear_or_helix"
            angle_deg: 20.0
            start_clearance: 0.100
            feed_multiplier: 0.65
            helix_radius_multiplier: 0.75

          peck_drill:
            depth_ratio: 0.25
            depth_min: 0.030
            depth_max: 0.080
            feed_multiplier: 0.12

      # Optional additional materials (starting points)
      hdpe:
        name: "HDPE"
        description: "Starter HDPE targets (bigger chips are okay; avoid rubbing)"

        cutting_model:
          preferred_rpm: 18000
          chipload_ref: 0.0045
          chipload_min: 0.0030
          chipload_max: 0.0120
          slotting_chipload_multiplier: 0.85

        strategy:
          stepover_ratio: 0.50
          slot_stepdown_ratio: 1.00
          clear_stepdown_ratio: 1.50

          ramp:
            type: "linear_or_helix"
            angle_deg: 15.0
            start_clearance: 0.120
            feed_multiplier: 0.70
            helix_radius_multiplier: 0.75

          peck_drill:
            depth_ratio: 0.30
            depth_min: 0.030
            depth_max: 0.100
            feed_multiplier: 0.15

      srpp:
        name: "SRPP (Self-Reinforced Polypropylene)"
        description: "Starter SRPP/MAXComposite-like targets (laminate caution + PP heat behavior)"

        cutting_model:
          preferred_rpm: 18000
          chipload_ref: 0.0039
          chipload_min: 0.0025
          chipload_max: 0.0070
          slotting_chipload_multiplier: 0.80

        strategy:
          stepover_ratio: 0.40
          slot_stepdown_ratio: 0.65
          clear_stepdown_ratio: 1.00

          ramp:
            type: "linear_or_helix"
            angle_deg: 10.0
            start_clearance: 0.080
            feed_multiplier: 0.65
            helix_radius_multiplier: 0.75

          peck_drill:
            depth_ratio: 0.25
            depth_min: 0.030
            depth_max: 0.080
            feed_multiplier: 0.12

    # -------------------------------------------------------------------------
    # INTEGRATIONS (Google Drive, etc.)
    # -------------------------------------------------------------------------
    # To enable automatic upload to Google Drive:
    # 1. Set enabled: true
    # 2. Get the folder_id from your Drive folder URL:
    #    - Open the folder in Google Drive
    #    - Copy the URL: https://drive.google.com/drive/folders/FOLDER_ID_HERE
    #    - Use the FOLDER_ID_HERE part as the folder_id value
    # 3. Make sure the folder is shared with your team and the PenguinCAM app
    integrations:
      google_drive:
        enabled: false
        # folder_id: "your_folder_id_here"  # Example: "1AbC2DeF3GhI4JkL5MnO6PqR7StU8VwX"

  # -------------------------------------------------------------------------
  # MACHINE 2: Avid CNC Pro2424 (Team 6238's machine)
  # -------------------------------------------------------------------------
  avid_pro2424:
    name: "Avid CNC Pro2424"

    machine:
      manufacturer: "Avid CNC"
      controller: "Mach4"

      dimensions:
        x_max: 24.0
        y_max: 24.0
        z_max: 8.0

      park_position:
        x: 0.5
        y: 23.5
        z: -0.5

      standard_work_offset: "G54"
      tube_jig_work_offset: "G55"
      coolant: "Air"

      spindle_limits:
        rpm_min: 6000
        rpm_max: 24000

      # Assume higher feed capability on the larger machine
      motion_limits:
        feed_xy_max: 300.0
        feed_z_max: 120.0
        traverse_xy: 300.0
        approach_z: 80.0

      machine_characteristics:
        rigidity_class: "heavy"
        runout_class: "good"

        rigidity_chipload_multipliers:
          light: 0.70
          medium: 1.00
          heavy: 1.15

        runout_estimate_in:
          excellent: 0.0004
          good:      0.0008
          typical:   0.0020
          poor:      0.0040

    default_tool:
      diameter: 0.157
      flutes: 1
      is_reference_tool: true

    machining:
      z_reference:
        sacrifice_board_depth: 0.008
        clearance_height: 0.5

      tabs:
        enabled: true
        width: 0.25
        height: 0.15
        remove_tabs: true

      holes:
        detection_tolerance: 0.0001
        min_millable_multiplier: 1.2

      fixturing:
        pause_before_perimeter: false

      feed_speed_policy:
        chipload_diameter_exponent: 0.70
        allow_reduce_rpm_to_recover_chipload: true

        runout_k_multiplier: 3.0
        limit_ramp_by_z_component:
          enabled: true
          z_cut_max: 60.0  # higher Z comfort on the bigger machine

    tube_facing:
      depth_margin: 0.005
      max_roughing_depth: 0.3
      max_finishing_depth: 0.51

      phase_1:
        roughing_tool_edge: 0.05
        finishing_tool_edge: 0.0625

      phase_2:
        roughing_tool_edge: -0.0125
        finishing_tool_edge: 0.0

      arc_advance: 0.04
      arc_radius: 0.05

    # On the Avid, you can either:
    # - keep the same material truth and let the machine feed caps differ, OR
    # - slightly increase chipload_max or slotting multipliers.
    #
    # Here, we keep the same material truth values for simplicity.
    materials:
      plywood:
        name: "Plywood"
        description: "Same ground-truth as Omio; higher machine caps allow faster derived feeds"
        cutting_model:
          preferred_rpm: 18000
          chipload_ref: 0.0039
          chipload_min: 0.0020
          chipload_max: 0.0100
          slotting_chipload_multiplier: 0.85
        strategy:
          stepover_ratio: 0.65
          slot_stepdown_ratio: 1.25
          clear_stepdown_ratio: 1.75
          ramp:
            type: "linear_or_helix"
            angle_deg: 20.0
            start_clearance: 0.150
            feed_multiplier: 0.70
            helix_radius_multiplier: 0.75
          peck_drill:
            depth_ratio: 0.25
            depth_min: 0.030
            depth_max: 0.100
            feed_multiplier: 0.15

      aluminum:
        name: "Aluminum"
        description: "Same ground-truth; more rigidity allows slightly higher ceilings"
        cutting_model:
          preferred_rpm: 18000
          chipload_ref: 0.0028
          chipload_min: 0.0015
          chipload_max: 0.0040
          slotting_chipload_multiplier: 0.75
        strategy:
          stepover_ratio: 0.25
          slot_stepdown_ratio: 0.30
          clear_stepdown_ratio: 0.60
          ramp:
            type: "linear_or_helix"
            angle_deg: 4.0
            start_clearance: 0.050
            feed_multiplier: 0.65
            helix_radius_multiplier: 0.50
          peck_drill:
            depth_ratio: 0.20
            depth_min: 0.020
            depth_max: 0.070
            feed_multiplier: 0.10

      polycarbonate:
        name: "Polycarbonate"
        description: "Same ground-truth; higher caps may allow higher derived feeds"
        cutting_model:
          preferred_rpm: 18000
          chipload_ref: 0.0039
          chipload_min: 0.0025
          chipload_max: 0.0080
          slotting_chipload_multiplier: 0.90
        strategy:
          stepover_ratio: 0.55
          slot_stepdown_ratio: 1.00
          clear_stepdown_ratio: 1.50
          ramp:
            type: "linear_or_helix"
            angle_deg: 20.0
            start_clearance: 0.100
            feed_multiplier: 0.70
            helix_radius_multiplier: 0.75
          peck_drill:
            depth_ratio: 0.25
            depth_min: 0.030
            depth_max: 0.100
            feed_multiplier: 0.12

    # Google Drive integration setup (same instructions as above)
    integrations:
      google_drive:
        enabled: false
        # folder_id: "your_folder_id_here"  # Get from Drive folder URL

# =============================================================================
# NOTES
# =============================================================================
# - To use this config, upload it to the root of your Onshape document tree
#   as "PenguinCAM-config.yaml" and make sure it is shared with your classroom
#   AND with the PenguinCAM app.
#
# - All "materials.*.cutting_model" fields are now ground-truth inputs.
# - Derived values (XY feed, ramp feed, peck feed, etc.) are computed at runtime
#   from: tool diameter/flutes + preferred_rpm + chipload scaling + machine caps.
# - Slotting derates chipload (or feed) to reduce load for perimeter-style cuts.
# - Stepdown limits are expressed as ratios of tool diameter (ap/D) so tool changes remain safe.
# - The machine selector will appear in the UI if you have multiple machines.
# - Each machine can have completely different feeds/speeds based on rigidity.
# - You can add custom materials to any machine.
# - V1 and V2 configs (without version: 3) still work for backward compatibility.
